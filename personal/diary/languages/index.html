<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Image reveal with filter &amp;&amp; clip-path 😎</title>
  <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<div class="image-container">
  <div class="image clip-ellipse-top-left"><img src="english.avif" alt="English language pattern" aria-hidden="true"/><img src="english.avif" alt="English language illustration"/></div>
  <div class="image clip-inset-top"><img src="hindi.webp" alt="Hindi language pattern" aria-hidden="true"/><img src="hindi.webp" alt="Hindi language illustration"/></div>
  <div class="image clip-ellipse-top-right"><img src="gujarati.jpg" alt="Gujarati language pattern" aria-hidden="true"/><img src="gujarati.jpg" alt="Gujarati language illustration"/></div>
  <div class="image clip-polygon-center"><img src="arabic.jpg" alt="Arabic language pattern" aria-hidden="true"/><img src="arabic.jpg" alt="Arabic language illustration"/></div>
  <div class="image clip-circle"><img src="chinese.jpg" alt="Chinese language pattern" aria-hidden="true"/><img src="chinese.jpg" alt="Chinese language illustration"/></div>
  <div class="image clip-inset-full"><img src="japanese.webp" alt="Japanese language pattern" aria-hidden="true"/><img src="japanese.webp" alt="Japanese language illustration"/></div>
  <div class="image clip-ellipse-bottom-left"><img src="urdu.jpg" alt="Urdu language pattern" aria-hidden="true"/><img src="urdu.jpg" alt="Urdu language illustration"/></div>
  <div class="image clip-inset-bottom"><img src="marathi.jpg" alt="Marathi language pattern" aria-hidden="true"/><img src="marathi.jpg" alt="Marathi language illustration"/></div>
  <div class="image clip-ellipse-bottom-right"><img src="french.jpg" alt="French language pattern" aria-hidden="true"/><img src="french.jpg" alt="French language illustration"/></div>
</div>
<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
